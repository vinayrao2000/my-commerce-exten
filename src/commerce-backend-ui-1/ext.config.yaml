hooks:
  pre-app-build: EXTENSION=backend-ui/1 $packageExec aio-commerce-lib-app hooks pre-app-build && EXTENSION=backend-ui/1 npx aio-commerce-lib-app hooks pre-app-build

operations:
  view:
    - type: web
      impl: index.html

actions: actions

web: web-src

runtimeManifest:
  packages:
    admin-ui-sdk:
      license: Apache-2.0
      actions:
        registration:
          function: .generated/actions/registration/index.js
          web: yes
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: $LOG_LEVEL
          annotations:
            require-adobe-auth: true
            final: true
