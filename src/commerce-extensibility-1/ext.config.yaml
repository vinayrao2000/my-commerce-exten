# The [pre-app-build] hooks are auto-generated. Do not remove or manually edit.
hooks:
  pre-app-build: EXTENSION=extensibility/1 npx aio-commerce-lib-app hooks pre-app-build

operations:
  # These worker processes definitions are auto-generated. Do not remove or manually edit.
  workerProcess:
    - type: action
      impl: app-management/app-config
    - type: action
      impl: app-management/installation

runtimeManifest:
  packages:
    # This package definition is auto-generated. Do not remove or manually edit.
    app-management:
      license: Apache-2.0
      actions:
        app-config:
          function: .generated/actions/app-management/app-config.js
          web: yes
          runtime: nodejs:24
          inputs:
            LOG_LEVEL: $LOG_LEVEL
          annotations:
            require-adobe-auth: true
            final: true
        installation:
          function: .generated/actions/app-management/installation.js
          web: yes
          runtime: nodejs:24
          inputs:
            LOG_LEVEL: $LOG_LEVEL
            AIO_COMMERCE_AUTH_IMS_CLIENT_ID: $AIO_COMMERCE_AUTH_IMS_CLIENT_ID
            AIO_COMMERCE_AUTH_IMS_CLIENT_SECRETS: $AIO_COMMERCE_AUTH_IMS_CLIENT_SECRETS
            AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_ID: $AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_ID
            AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_EMAIL: $AIO_COMMERCE_AUTH_IMS_TECHNICAL_ACCOUNT_EMAIL
            AIO_COMMERCE_AUTH_IMS_ORG_ID: $AIO_COMMERCE_AUTH_IMS_ORG_ID
            AIO_COMMERCE_AUTH_IMS_SCOPES: $AIO_COMMERCE_AUTH_IMS_SCOPES
          annotations:
            require-adobe-auth: true
            final: true
          limits:
            timeout: 600000
    course-labs:
      actions:
        product-enrichment:
          function: actions/labs/product-enrichment/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
            IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
            IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
            IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
            IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
            COMMERCE_API_BASE_URL: $COMMERCE_API_BASE_URL
          limits:
            timeout: 60000
            memorySize: 256
          annotations:
            require-adobe-auth: false
            final: true
        validate-product:
          function: actions/labs/validate-product/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
          limits:
            timeout: 10000
            memorySize: 256
          annotations:
            require-adobe-auth: false
            final: true
        order-event-consumer:
          function: actions/labs/order-event-consumer/index.js
          web: 'no'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
            IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
            IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
            IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
            IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
            COMMERCE_API_BASE_URL: $COMMERCE_API_BASE_URL
            COMMERCE_STORE_CODE: $COMMERCE_STORE_CODE
          limits:
            timeout: 60000
            memorySize: 256
          annotations:
            require-adobe-auth: false
            final: true
        fetch-enriched-orders:
          function: actions/labs/fetch-enriched-orders/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
          limits:
            timeout: 10000
            memorySize: 256
          annotations:
            require-adobe-auth: false
            final: true
        get-enriched-orders:
          function: actions/labs/get-enriched-orders/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
          limits:
            timeout: 30000
            memorySize: 256
          annotations:
            require-adobe-auth: false
            final: true
